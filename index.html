<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pui Sui Meet Timer</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

:root{
    --bg:#fef6f9;
    --card:#ffffff;
    --primary:#d8e2dc;
    --accent:#f4acb7;
    --text:#444;
    --cross:#e63946;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins;}

body{
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.calendar-container{
    background:var(--card);
    width:100%;
    max-width:600px;
    border-radius:22px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.timer{
    text-align:center;
    font-weight:600;
    margin-bottom:8px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.header button{
    background:var(--accent);
    border:none;
    border-radius:12px;
    padding:6px 12px;
    cursor:pointer;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
}

.day-name{
    text-align:center;
    font-size:.75rem;
    color:#888;
}

.date{
    background:var(--primary);
    aspect-ratio:1/1;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    cursor:pointer;
    transition:all 0.3s ease;
}

/* Checked day */
.date.checked{
    background:#a8dadc;
    text-decoration:line-through;
}

/* Past days */
.date.past{
    opacity:0.4;
}

/* Today highlight */
.date.today{
    border:2px solid #e63946;
    background:#ffe5ec;
    font-weight:600;
}

/* Final day */
.date.final-day{
    background:#ffd6e0;
    box-shadow:0 0 15px rgba(244,172,183,0.9);
    transform:scale(1.05);
    font-weight:600;
}

/* Confetti */
.confetti{
    position:fixed;
    top:-10px;
    width:8px;
    height:8px;
    animation:fall 2s linear forwards;
}

@keyframes fall{
    to{transform:translateY(100vh) rotate(720deg);opacity:0;}
}
</style>
</head>

<body>

<div class="calendar-container">

<div id="countdown" class="timer"></div>
<div id="dayCounter" class="timer"></div>

<div class="header">
<button id="prev">◀</button>
<h2 id="monthYear"></h2>
<button id="next">▶</button>
</div>

<div id="calendar" class="calendar"></div>

</div>

<script>
const calendar=document.getElementById("calendar");
const monthYear=document.getElementById("monthYear");
const countdown=document.getElementById("countdown");
const dayCounter=document.getElementById("dayCounter");

let current=new Date();

const TARGET_YEAR=2026;
const TARGET_MONTH=5; // June
const TARGET_DAY=12;

/* LOAD SAVED DATA */
let checkedDays = JSON.parse(localStorage.getItem("checkedDays")) || {};

/* COUNTDOWN (ONLY DAYS) */
function updateCountdown(){
    const now=new Date();
    const target=new Date(TARGET_YEAR,TARGET_MONTH,TARGET_DAY);
    const diff=target-now;

    if(diff<=0){
        countdown.textContent="🎯 She’s Home ❤️";
        return;
    }

    const days=Math.floor(diff/(1000*60*60*24));

    countdown.textContent=`⏳ ${days} Days left until I hug you again ❤️`;
}

setInterval(updateCountdown,1000);
updateCountdown();

/* DAY COUNTER (ONLY MANUAL) */
function updateDayCounter(){
    const total = Object.keys(checkedDays).length;
    dayCounter.textContent = `✅ Days Completed: ${total}`;
}

/* CONFETTI */
function shootConfetti(){
    for(let i=0;i<30;i++){
        const c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.backgroundColor=["#f4acb7","#ffd6a5","#cdb4db","#bde0fe","#ffafcc"][Math.floor(Math.random()*5)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),2000);
    }
}

/* CALENDAR */
function renderCalendar(){
    calendar.innerHTML="";

    const year=current.getFullYear();
    const month=current.getMonth();

    const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
    monthYear.textContent=`${months[month]} ${year}`;

    const firstDay=new Date(year,month,1).getDay();
    let daysInMonth=new Date(year,month+1,0).getDate();

    if(year===TARGET_YEAR && month===TARGET_MONTH){
        daysInMonth=TARGET_DAY;
    }

    const today=new Date();
    const todayDate=new Date(today.getFullYear(), today.getMonth(), today.getDate());

    ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{
        const div=document.createElement("div");
        div.className="day-name";
        div.textContent=d;
        calendar.appendChild(div);
    });

    for(let i=0;i<firstDay;i++){
        calendar.appendChild(document.createElement("div"));
    }

    for(let day=1;day<=daysInMonth;day++){
        const cell=document.createElement("div");
        cell.className="date";
        cell.textContent=day;

        const cellDate=new Date(year,month,day);
        const key = `${year}-${month}-${day}`;

        // Past days
        if(cellDate < todayDate){
            cell.classList.add("past");
        }

        // Today highlight
        if(cellDate.getTime() === todayDate.getTime()){
            cell.classList.add("today");
        }

        // Restore checked state
        if(checkedDays[key]){
            cell.classList.add("checked");
        }

        // Final day
        if(year===TARGET_YEAR && month===TARGET_MONTH && day===TARGET_DAY){
            cell.classList.add("final-day");
        }

        cell.onclick=()=>{
            if(cell.classList.contains("final-day")){
                shootConfetti();
                return;
            }

            if(cell.classList.contains("checked")){
                cell.classList.remove("checked");
                delete checkedDays[key];
            } else {
                cell.classList.add("checked");
                checkedDays[key]=true;
                shootConfetti();
            }

            localStorage.setItem("checkedDays", JSON.stringify(checkedDays));
            updateDayCounter();
        };

        calendar.appendChild(cell);
    }

    const totalCells = firstDay + daysInMonth;
    const remaining = 7 - (totalCells % 7);

    if(remaining < 7){
        for(let i=0;i<remaining;i++){
            const empty=document.createElement("div");
            empty.style.visibility="hidden";
            calendar.appendChild(empty);
        }
    }

    updateDayCounter();
}

/* NAVIGATION */
document.getElementById("prev").onclick=()=>{
    current.setMonth(current.getMonth()-1);
    renderCalendar();
};

document.getElementById("next").onclick=()=>{
    const next=new Date(current);
    next.setMonth(current.getMonth()+1);

    if(next.getFullYear()>TARGET_YEAR || 
       (next.getFullYear()===TARGET_YEAR && next.getMonth()>TARGET_MONTH)){
        return;
    }

    current=next;
    renderCalendar();
};

renderCalendar();
</script>

</body>
</html>
