<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pui Sui Meet Timer</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

:root{
    --bg:#fef6f9;
    --card:#ffffff;
    --primary:#d8e2dc;
    --accent:#f4acb7;
    --text:#444;
    --cross:#e63946;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins;}

body{
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.calendar-container{
    background:var(--card);
    width:100%;
    max-width:600px;
    border-radius:22px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.timer{
    text-align:center;
    margin-bottom:12px;
    font-weight:600;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.header button{
    background:var(--accent);
    border:none;
    border-radius:12px;
    padding:6px 12px;
    cursor:pointer;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
}

.day-name{
    text-align:center;
    font-size:.75rem;
    color:#888;
}

.date{
    background:var(--primary);
    aspect-ratio:1/1;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    cursor:pointer;
}

.date.disabled{
    opacity:0.3;
    pointer-events:none;
}

.cross-line{
    stroke:var(--cross);
    stroke-width:5;
    stroke-dasharray:100;
    stroke-dashoffset:100;
}

.date.checked .line1{animation:draw .4s forwards;}
.date.checked .line2{animation:draw .4s forwards .2s;}

@keyframes draw{to{stroke-dashoffset:0}}

/* CONFETTI */
.confetti{
    position:fixed;
    top:-10px;
    width:8px;
    height:8px;
    animation:fall 2s linear forwards;
}

@keyframes fall{
    to{transform:translateY(100vh) rotate(720deg);opacity:0;}
}
</style>
</head>

<body>

<div class="calendar-container">

<div id="countdown" class="timer"></div>

<div class="header">
<button id="prev">◀</button>
<h2 id="monthYear"></h2>
<button id="next">▶</button>
</div>

<div id="calendar" class="calendar"></div>

</div>

<script>
const calendar=document.getElementById("calendar");
const monthYear=document.getElementById("monthYear");
const countdown=document.getElementById("countdown");

let current=new Date();

// FINAL TARGET DATE
const TARGET_YEAR=2026;
const TARGET_MONTH=5; // June
const TARGET_DAY=12;

/* COUNTDOWN */
function updateCountdown(){
    const now=new Date();
    const target=new Date(TARGET_YEAR,TARGET_MONTH,TARGET_DAY);
    const diff=target-now;

    if(diff<=0){
        countdown.textContent="🎯 She’s Home ❤️";
        return;
    }

    const days=Math.floor(diff/(1000*60*60*24));
    const hrs=Math.floor((diff/(1000*60*60))%24);
    const mins=Math.floor((diff/(1000*60))%60);
    const secs=Math.floor((diff/1000)%60);

    countdown.textContent=
        `⏳ ${days} Days ${hrs} Hrs ${mins} Min ${secs} Sec until I hug you again ❤️`;
}

setInterval(updateCountdown,1000);
updateCountdown();

/* CONFETTI */
function shootConfetti(){
    for(let i=0;i<30;i++){
        const c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"vw";
        c.style.backgroundColor=["#f4acb7","#ffd6a5","#cdb4db","#bde0fe","#ffafcc"][Math.floor(Math.random()*5)];
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),2000);
    }
}

/* CALENDAR */
function renderCalendar(){
    calendar.innerHTML="";

    const year=current.getFullYear();
    const month=current.getMonth();

    const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
    monthYear.textContent=`${months[month]} ${year}`;

    const firstDay=new Date(year,month,1).getDay();
    const daysInMonth=new Date(year,month+1,0).getDate();

    ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{
        const div=document.createElement("div");
        div.className="day-name";
        div.textContent=d;
        calendar.appendChild(div);
    });

    for(let i=0;i<firstDay;i++){
        calendar.appendChild(document.createElement("div"));
    }

    for(let day=1;day<=daysInMonth;day++){
        const cell=document.createElement("div");
        cell.className="date";
        cell.textContent=day;

        // DISABLE DATES AFTER JUNE 12, 2026
        if(year===TARGET_YEAR && month===TARGET_MONTH && day> TARGET_DAY){
            cell.classList.add("disabled");
        }

        // PREVENT FUTURE NAVIGATION
        if(year> TARGET_YEAR || (year===TARGET_YEAR && month> TARGET_MONTH)){
            cell.classList.add("disabled");
        }

        cell.onclick=()=>{
            if(cell.classList.contains("disabled")) return;

            cell.classList.toggle("checked");
            shootConfetti();
        };

        const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");

        const l1=document.createElementNS("http://www.w3.org/2000/svg","line");
        l1.setAttribute("x1","10");
        l1.setAttribute("y1","10");
        l1.setAttribute("x2","90");
        l1.setAttribute("y2","90");
        l1.setAttribute("class","cross-line line1");

        const l2=document.createElementNS("http://www.w3.org/2000/svg","line");
        l2.setAttribute("x1","90");
        l2.setAttribute("y1","10");
        l2.setAttribute("x2","10");
        l2.setAttribute("y2","90");
        l2.setAttribute("class","cross-line line2");

        svg.append(l1,l2);
        cell.appendChild(svg);

        calendar.appendChild(cell);
    }
}

/* NAVIGATION LIMIT */
document.getElementById("prev").onclick=()=>{
    current.setMonth(current.getMonth()-1);
    renderCalendar();
};

document.getElementById("next").onclick=()=>{
    const next=new Date(current);
    next.setMonth(current.getMonth()+1);

    if(next.getFullYear()>TARGET_YEAR || 
       (next.getFullYear()===TARGET_YEAR && next.getMonth()>TARGET_MONTH)){
        return;
    }

    current=next;
    renderCalendar();
};

renderCalendar();
</script>

</body>
</html>
