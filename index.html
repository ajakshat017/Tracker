<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pui Sui Meet Timer</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

:root{
    --bg:#fef6f9;
    --card:#ffffff;
    --primary:#d8e2dc;
    --accent:#f4acb7;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins;}

body{
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.calendar-container{
    background:var(--card);
    max-width:600px;
    width:100%;
    padding:20px;
    border-radius:20px;
}

.timer{
    text-align:center;
    font-weight:600;
    margin-bottom:10px;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
}

.date{
    background:var(--primary);
    aspect-ratio:1/1;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.date.checked{
    background:#a8dadc;
    text-decoration:line-through;
}

.date.past{
    opacity:0.4;
}

.date.today{
    border:2px solid red;
}

.date.final-day{
    background:#ffd6e0;
}
</style>
</head>

<body>

<div class="calendar-container">
<div id="countdown" class="timer"></div>
<div id="calendar" class="calendar"></div>
</div>

<script>
const calendar=document.getElementById("calendar");
const countdown=document.getElementById("countdown");

let current=new Date();

const TARGET_YEAR=2026;
const TARGET_MONTH=5;
const TARGET_DAY=12;

let counter = parseInt(localStorage.getItem("counter")) || 0;
let checkedDays = JSON.parse(localStorage.getItem("checkedDays")) || {};

/* COUNTDOWN */
function updateCountdown(){
    const now=new Date();
    const target=new Date(TARGET_YEAR,TARGET_MONTH,TARGET_DAY);
    const diff=target-now;

    if(diff<=0){
        countdown.textContent="🎯 She’s Home ❤️";
        return;
    }

    const days=Math.floor(diff/(1000*60*60*24));
    countdown.textContent=`⏳ ${days} Days left ❤️ | Progress: ${counter}`;
}

setInterval(updateCountdown,1000);
updateCountdown();

/* CALENDAR */
function renderCalendar(){
    calendar.innerHTML="";

    const year=current.getFullYear();
    const month=current.getMonth();

    const firstDay=new Date(year,month,1).getDay();
    const daysInMonth=new Date(year,month+1,0).getDate();

    const today=new Date();
    const todayDate=new Date(today.getFullYear(), today.getMonth(), today.getDate());

    for(let i=0;i<firstDay;i++){
        calendar.appendChild(document.createElement("div"));
    }

    for(let day=1;day<=daysInMonth;day++){
        const cell=document.createElement("div");
        cell.className="date";
        cell.textContent=day;

        const cellDate=new Date(year,month,day);
        const key = `${year}-${month}-${day}`;

        if(cellDate < todayDate){
            cell.classList.add("past");
        }

        if(cellDate.getTime() === todayDate.getTime()){
            cell.classList.add("today");
        }

        if(checkedDays[key]){
            cell.classList.add("checked");
        }

        if(year===TARGET_YEAR && month===TARGET_MONTH && day===TARGET_DAY){
            cell.classList.add("final-day");
        }

        cell.onclick=()=>{
            const isPast = cellDate < todayDate;

            if(cell.classList.contains("checked")){
                cell.classList.remove("checked");
                delete checkedDays[key];

                if(isPast){
                    counter++;   // 🔥 YOUR REQUIREMENT
                } else {
                    counter--;
                }
            } else {
                cell.classList.add("checked");
                checkedDays[key]=true;

                if(isPast){
                    counter--;   // reverse logic for past
                } else {
                    counter++;
                }
            }

            localStorage.setItem("checkedDays", JSON.stringify(checkedDays));
            localStorage.setItem("counter", counter);
            updateCountdown();
        };

        calendar.appendChild(cell);
    }
}

renderCalendar();
</script>

</body>
</html>
